<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Facebook</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1877f2;
            margin-bottom: 20px;
        }

        img {
            width: 90%;
            max-width: 1200px;
            border-radius: 10px;
            border: 3px solid #1877f2;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>PLATAFORMA FACEBOOK</h1>

        <!-- Reemplaza el nombre de la imagen por el archivo correcto -->
        <img src="facebook.png" alt="Infografía de Facebook">
    </div>

</body>
</html>
